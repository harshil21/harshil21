name: Update README cards

on:
  schedule:
    - cron: "0 0 * * 0" # Runs once a week at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-slim

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-save github:readme-tools/github-readme-stats

      - name: Generate all cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-cards.mjs

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push origin HEAD:refs/heads/${{ github.event.repository.default_branch }}
